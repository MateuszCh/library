<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon"
          type="image/png"
          href="/favicon.png" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&family=Pacifico&display=swap"
          rel="stylesheet">
</head>

<body>
    <div class="container"
         id="container"
         style="visibility: hidden;">
        <div style="display: flex; align-items: baseline; justify-content: space-between;">
            <h1 class="title"
                id="title"
                style="font-size: 64px;">Library</h1>
            <p class="listing-count"
               id="listing-count"></p>
        </div>
        <div class="tools"
             id="tools">
            <form class="tools-form"
                  onsubmit="event.preventDefault();"
                  id="tools-form"
                  method="POST">
                <input type="text"
                       class="listing-search"
                       id="listing-search"
                       style="width: 100%;"
                       name="title"
                       placeholder="Title, artist, album, release year, etc." />
                <div id="listing-sort-options"
                     class="listing-sort-options">

                </div>
            </form>
        </div>
        <div class="listing">
            <ul id="listing-results"
                class="listing-results">

            </ul>
        </div>
    </div>
    <script type="module"
            src="/src/main.ts"></script>
</body>

</html>
